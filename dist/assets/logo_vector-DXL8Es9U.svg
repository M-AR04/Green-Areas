<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for filters or gradients if needed -->
  <defs>
    <!-- Subtle metallic shadow to give a premium feel -->
    <filter id="premium-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3ab14d" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background is transparent so it can overlay on any card, but let's draw the vector elements -->
  <g filter="url(#premium-glow)">
    <!-- 1. Top Bright Green Chevron Roof -->
    <!-- Peak: 250,80 | Outer Right: 360,190 | Outer Left: 140,190 | Thickness: 50px horizontally -->
    <path 
      d="M 250,80 L 364,194 H 314 L 250,130 L 186,194 H 136 Z" 
      fill="#3ab14d" 
      stroke="#3ab14d" 
      stroke-width="1"
      stroke-linejoin="miter" 
    />

    <!-- 2. Left Flanking Slanted Block -->
    <!-- Symmetric to the right block, shifted left, top/bottom cut horizontally -->
    <path 
      d="M 120,165 L 140,145 L 90,195 L 70,215 Z" 
      fill="#3ab14d" 
    />
    <!-- Wait, let's make it a clean parallel block:
         Inner edge: x + y = 300, Outer edge: x + y = 260
         Between y = 145 and y = 215
         At y = 145, inner x = 155, outer x = 115.
         At y = 215, inner x = 85, outer x = 45.
    -->
    <path 
      d="M 115,145 L 155,145 L 85,215 L 45,215 Z" 
      fill="#3ab14d" 
    />

    <!-- 3. Right Flanking Slanted Block -->
    <!-- Inner edge: x - y = 200, Outer edge: x - y = 240
         Between y = 145 and y = 215
         At y = 145, inner x = 345, outer x = 385.
         At y = 215, inner x = 415, outer x = 455.
    -->
    <path 
      d="M 385,145 L 345,145 L 415,215 L 455,215 Z" 
      fill="#3ab14d" 
    />

    <!-- 4. Inner Dark Green/Teal Chevron -->
    <!-- Peak: 250,145 | Outer Right: 300,195 | Outer Left: 200,195 | Thickness: 35px horizontally -->
    <path 
      d="M 250,145 L 305,200 H 270 L 250,180 L 230,200 H 195 Z" 
      fill="#074737" 
    />

    <!-- 5. Central Focus Dot -->
    <!-- Circle centered at 250,225 with radius 20 -->
    <circle cx="250" cy="225" r="20" fill="#074737" />

    <!-- 6. Branding Text: GREEN AREAS -->
    <!-- Styled to match the exact font and layout of logo.png -->
    <text 
      x="250" 
      y="315" 
      font-family="'Outfit', 'Cairo', sans-serif" 
      font-weight="900" 
      font-size="64" 
      fill="#3ab14d" 
      text-anchor="middle" 
      letter-spacing="1.5"
    >GREEN</text>

    <text 
      x="250" 
      y="375" 
      font-family="'Outfit', 'Cairo', sans-serif" 
      font-weight="900" 
      font-size="60" 
      fill="#074737" 
      text-anchor="middle" 
      letter-spacing="2"
    >AREAS</text>
  </g>
</svg>
